# Minimal config for integration tests
# Uses a dummy API key — no real LLM calls are made during tests

[llm]
api_key     = "sk-or-test-dummy-key-for-integration-tests"
model       = "openai/gpt-4o-mini"
base_url    = "https://openrouter.ai/api/v1"
max_tokens  = 1024

[skills]
# Point at the built-in skills directory (resolved from repo root)
paths = ["skills/built-in"]

[memory]
# Use /tmp so there are no mounted-filesystem write restrictions during tests
db_path = "/tmp/claw-e2e-test.db"

[browser]
headless   = true
timeout_ms = 30000

[logging]
dir   = "/tmp/claw-e2e-logs"
level = "warn"
